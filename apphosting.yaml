runConfig:
  minInstances: 0
  maxInstances: 3
  cpu: 1
  memoryMiB: 512
  concurrency: 80

env:
  - variable: FIRESTORE_DATABASE_ID
    value: tichel-co-db-eu
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIRESTORE_DATABASE_ID
    value: tichel-co-db-eu
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_DEFAULT_LOCALE
    value: he
    availability:
      - BUILD
      - RUNTIME

  # All other env vars (Firebase config, Admin SDK credentials, Stripe, Resend)
  # are configured via the Firebase App Hosting backend settings in the console.
