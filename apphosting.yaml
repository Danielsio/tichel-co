runConfig:
  minInstances: 0
  maxInstances: 3
  cpu: 1
  memoryMiB: 512
  concurrency: 80

env:
  # ── App ──────────────────────────────────────────────────────────────────────
  - variable: NEXT_PUBLIC_DEFAULT_LOCALE
    value: he
    availability:
      - BUILD
      - RUNTIME

  # ── Firestore ────────────────────────────────────────────────────────────────
  - variable: FIRESTORE_DATABASE_ID
    value: tichel-co-db-eu
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIRESTORE_DATABASE_ID
    value: tichel-co-db-eu
    availability:
      - BUILD
      - RUNTIME

  # ── Firebase client config + Admin SDK credentials ───────────────────────────
  # All of the following are set via Firebase Console:
  # App Hosting → Backend tichel-co → Environment
  #
  #   NEXT_PUBLIC_FIREBASE_API_KEY
  #   NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
  #   NEXT_PUBLIC_FIREBASE_PROJECT_ID
  #   NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
  #   NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
  #   NEXT_PUBLIC_FIREBASE_APP_ID
  #   GCP_ADMIN_PROJECT_ID
  #   GCP_ADMIN_CLIENT_EMAIL
  #   GCP_ADMIN_PRIVATE_KEY
