name: Deploy

on:
  push:
    branches: [master]

jobs:
  deploy-firestore:
    name: Deploy Firestore Rules & Indexes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: npm install -g firebase-tools
      - name: Deploy rules and indexes
        run: firebase deploy --only firestore --project tichel-co --non-interactive
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

  # Frontend is deployed automatically by Firebase App Hosting
  # on every push to master (connected via GitHub integration).
