name: Deploy

on:
  push:
    branches: [master]

jobs:
  deploy-functions-staging:
    name: Deploy Cloud Functions (Staging)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: cd functions && pnpm install --frozen-lockfile && pnpm build
      - run: npm install -g firebase-tools
      - run: firebase deploy --only functions --project ${{ secrets.FIREBASE_PROJECT_ID_DEV }} --non-interactive
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

  deploy-firestore-staging:
    name: Deploy Firestore Rules (Staging)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: npm install -g firebase-tools
      - run: firebase deploy --only firestore --project ${{ secrets.FIREBASE_PROJECT_ID_DEV }} --non-interactive
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

  # Frontend is deployed automatically by Firebase App Hosting
  # on every push to master (connected via GitHub integration).
