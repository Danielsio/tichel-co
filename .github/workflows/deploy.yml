name: Deploy

on:
  push:
    branches: [master]
    paths:
      - firestore.rules
      - firestore.indexes.json

permissions:
  contents: read
  id-token: write

jobs:
  deploy-firestore:
    name: Deploy Firestore Rules & Indexes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/439958953518/locations/global/workloadIdentityPools/github-actions/providers/github-provider
          service_account: github-actions-deploy@tichel-co.iam.gserviceaccount.com

      - run: npm install -g firebase-tools

      - name: Deploy rules and indexes
        run: firebase deploy --only firestore --project tichel-co --non-interactive

  # Frontend is deployed automatically by Firebase App Hosting
  # on every push to master (connected via GitHub integration).
